<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>webgpu-fmidx — GPU-Accelerated FM-Index Demo</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      max-width: 860px;
      margin: 0 auto;
      padding: 2rem 1rem;
      background: #0d1117;
      color: #c9d1d9;
      line-height: 1.6;
    }

    h1 { color: #58a6ff; margin-bottom: 0.25rem; }
    h2 { color: #8b949e; font-size: 0.95rem; font-weight: 400; margin-top: 0; }
    h3 { color: #58a6ff; font-size: 1rem; margin: 1.5rem 0 0.5rem; }

    .card {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 8px;
      padding: 1.25rem;
      margin: 1rem 0;
    }

    label { display: block; font-size: 0.85rem; color: #8b949e; margin-bottom: 0.4rem; }

    textarea, input[type="text"] {
      width: 100%;
      background: #0d1117;
      border: 1px solid #30363d;
      border-radius: 6px;
      color: #c9d1d9;
      font-family: monospace;
      font-size: 0.9rem;
      padding: 0.6rem 0.75rem;
      resize: vertical;
    }
    textarea:focus, input[type="text"]:focus {
      outline: none;
      border-color: #58a6ff;
    }

    .row { display: flex; gap: 0.75rem; align-items: flex-end; flex-wrap: wrap; }
    .row label { margin-bottom: 0; }

    button {
      background: #238636;
      border: 1px solid #2ea043;
      border-radius: 6px;
      color: #fff;
      cursor: pointer;
      font-size: 0.9rem;
      padding: 0.5rem 1.1rem;
      white-space: nowrap;
    }
    button:hover { background: #2ea043; }
    button:disabled { background: #21262d; border-color: #30363d; color: #484f58; cursor: not-allowed; }
    button.secondary {
      background: #21262d;
      border-color: #30363d;
      color: #c9d1d9;
    }
    button.secondary:hover { background: #30363d; }

    .status {
      font-size: 0.85rem;
      padding: 0.5rem 0.75rem;
      border-radius: 6px;
      margin-top: 0.75rem;
    }
    .status.info    { background: #0c2d6b; color: #79c0ff; }
    .status.success { background: #0f2d1f; color: #56d364; }
    .status.error   { background: #2d0f0f; color: #f85149; }

    table { border-collapse: collapse; width: 100%; font-size: 0.85rem; margin-top: 0.75rem; }
    th, td { border: 1px solid #30363d; padding: 0.4rem 0.75rem; text-align: left; }
    th { background: #21262d; color: #8b949e; }
    tr:nth-child(even) td { background: #161b22; }

    .metric { display: inline-block; margin-right: 2rem; }
    .metric span { font-size: 1.4rem; font-weight: 600; color: #58a6ff; }
    .metric small { display: block; font-size: 0.75rem; color: #8b949e; }

    #gpu-badge {
      display: inline-block;
      font-size: 0.75rem;
      padding: 0.15rem 0.5rem;
      border-radius: 999px;
      margin-left: 0.5rem;
      vertical-align: middle;
    }
    #gpu-badge.available    { background: #0f2d1f; color: #56d364; border: 1px solid #2ea043; }
    #gpu-badge.unavailable  { background: #2d0f0f; color: #f85149; border: 1px solid #da3633; }

    pre { background: #0d1117; border: 1px solid #30363d; border-radius: 6px; padding: 0.75rem; overflow-x: auto; font-size: 0.8rem; }

    .hidden { display: none !important; }
  </style>
  <script type="module" crossorigin src="/webgpu-fmidx/assets/index-B6T6bk2i.js"></script>
</head>
<body>

<h1>webgpu-fmidx <span id="gpu-badge">checking GPU…</span></h1>
<h2>GPU-accelerated FM-index for DNA sequences — running entirely in your browser</h2>

<!-- ── Step 1: Input ──────────────────────────────────── -->
<div class="card">
  <h3>1. Input Sequences</h3>
  <label for="sequences-input">
    Paste DNA sequences (plain ACGT or FASTA format). One sequence per line for plain input.
  </label>
  <textarea id="sequences-input" rows="6" spellcheck="false" placeholder=">seq1
ACGTACGTACGTACGT
>seq2
TGCATGCATGCATGCA
>seq3
AAACCCGGGTTT"></textarea>

  <div class="row" style="margin-top: 0.75rem;">
    <div>
      <label for="sample-rate">SA sample rate</label>
      <input type="text" id="sample-rate" value="32" style="width:80px" />
    </div>
    <button id="build-cpu-btn">Build (CPU)</button>
    <button id="build-gpu-btn">Build (GPU)</button>
    <button class="secondary" id="load-example-btn">Load example</button>
  </div>
  <div id="build-status" class="hidden"></div>
</div>

<!-- ── Step 2: Index stats ───────────────────────────── -->
<div class="card hidden" id="index-stats-card">
  <h3>2. Index Statistics</h3>
  <div id="index-metrics"></div>
</div>

<!-- ── Step 3: Query ────────────────────────────────── -->
<div class="card hidden" id="query-card">
  <h3>3. Search Pattern</h3>
  <div class="row">
    <div style="flex:1">
      <label for="pattern-input">Pattern (ACGT)</label>
      <input type="text" id="pattern-input" placeholder="e.g. ACGT" spellcheck="false" />
    </div>
    <button id="search-btn">Search</button>
  </div>
  <div id="search-status" class="hidden"></div>
  <div id="search-results" class="hidden"></div>
</div>

<!-- ── Step 4: Serialize ─────────────────────────────── -->
<div class="card hidden" id="serialize-card">
  <h3>4. Serialize / Deserialize</h3>
  <p style="font-size:0.85rem;color:#8b949e;margin-top:0">
    Export the built index to bytes (e.g. for caching), then reload it.
  </p>
  <div class="row">
    <button id="export-btn">Export to bytes</button>
    <button id="import-btn" disabled>Reload from bytes</button>
  </div>
  <div id="serialize-status" class="hidden"></div>
</div>

</body>
</html>
